<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            color: #38bdf8;
        }

        input {
            width: 92%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

{% if request.query_params.get('error') %}
<p id="error-msg" style="color:red; text-align:center;">
    Invalid credentials. Please try again.
</p>

<script>
setTimeout(() => {
    const msg = document.getElementById("error-msg");
    if (msg) {
        msg.style.display = "none";
    }
}, 3000);
</script>
{% endif %}

    <form method="post" action="/login">
        <input type="text" name="student_id" placeholder="Student ID" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <a href="/register">Create Account</a>
</div>

</body>
</html>
